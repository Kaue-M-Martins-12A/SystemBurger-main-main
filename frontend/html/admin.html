<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger - Admin</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/admin.js" defer></script>
</head>
<body class="admin-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Burger Place</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item"><span class="icon">🏠</span> Início</a>
            <a href="/admin" class="nav-item active"><span class="icon">📊</span> Dashboard</a>
            <a href="/admin/pedidos" class="nav-item"><span class="icon">📦</span> Pedidos</a>
            <a href="/admin/produtos" class="nav-item"><span class="icon">🍔</span> Produtos</a>
            <a href="/admin/usuarios" class="nav-item"><span class="icon">👥</span> Usuários</a>
        </nav>
    </aside>

    <main class="admin-main">
        <section id="section-dashboard" class="admin-section">
            <header class="admin-top-header">
                <div class="header-content">
                    <div>
                        <h1>Dashboard Geral</h1>
                        <p class="text-muted">Visão geral dos principais indicadores de desempenho (KPIs) para o seu negócio.</p>
                    </div>
                </div>
            </header>
            <div class="kpi-grid">
                <div class="kpi-card">
                    <p>Vendas em Tempo Real</p>
                    <h2 id="kpi-vendas">R$ 0,00</h2>
                </div>
                <div class="kpi-card">
                    <p>Média de Pedidos</p>
                    <h2 id="kpi-media">R$ 0,00</h2>
                </div>
                <div class="kpi-card">
                    <p>Clientes Ativos</p>
                    <h2 id="kpi-clientes">0</h2>
                </div>
                <div class="kpi-card">
                    <p>Entregas em Andamento</p>
                    <h2 id="kpi-entregas">0</h2>
                </div>
            </div>
            
            <div class="charts-area">
                <div class="chart-container" style="background:#fff; padding:20px; border-radius:12px; margin-top:30px;">
                    <h3>Vendas por Período</h3>
                    <h2 id="kpi-vendas-totais">R$ 0,00</h2>
                    <canvas id="salesChart" height="80"></canvas>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
